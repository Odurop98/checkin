<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-In System</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; color: #1f2937; }
  .card { background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); width: 100%; max-width: 1100px; overflow: hidden; }
  .header { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; padding: 24px 28px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 1.4rem; font-weight: 600; }
  .header .sub { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }
  .header .status { font-size: 0.75rem; margin-top: 6px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; }
  .dot.connected { background: #10b981; }
  .dot.error { background: #ef4444; }
  .nav-btn { background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
  .nav-btn:hover { background: rgba(255,255,255,0.3); }
  .body { padding: 32px 28px; }
  .config-warn { background: #fef3c7; border: 1px solid #fbbf24; border-radius: 10px; padding: 20px; margin-bottom: 24px; color: #78350f; }
  .config-warn h3 { margin-bottom: 8px; }
  .config-warn code { background: #fff; padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; word-break: break-all; }
  .landing { text-align: center; padding: 24px 0; }
  .landing h2 { font-size: 1.8rem; margin-bottom: 8px; }
  .landing p { color: #6b7280; margin-bottom: 32px; }
  .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 600px; margin: 0 auto; }
  .role-card { border: 2px solid #e5e7eb; border-radius: 12px; padding: 28px 20px; cursor: pointer; transition: all 0.2s; background: #fff; }
  .role-card:hover { border-color: #4f46e5; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(79,70,229,0.15); }
  .role-card .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .role-card h3 { font-size: 1.1rem; margin-bottom: 6px; }
  .role-card p { font-size: 0.85rem; color: #6b7280; margin: 0; }
  .client-form { max-width: 480px; margin: 0 auto; text-align: center; }
  .client-form h2 { font-size: 1.6rem; margin-bottom: 8px; }
  .client-form .desc { color: #6b7280; margin-bottom: 28px; }
  .pin-input { width: 100%; padding: 18px 20px; font-size: 1.4rem; text-align: center; letter-spacing: 4px; border: 2px solid #e5e7eb; border-radius: 10px; outline: none; font-family: monospace; }
  .pin-input:focus { border-color: #4f46e5; }
  .submit-btn { margin-top: 16px; width: 100%; padding: 14px; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: 600; cursor: pointer; }
  .submit-btn:hover:not(:disabled) { transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .result { margin-top: 24px; padding: 20px; border-radius: 10px; text-align: left; display: none; }
  .result.success { background: #ecfdf5; border: 1px solid #6ee7b7; display: block; }
  .result.error { background: #fef2f2; border: 1px solid #fca5a5; display: block; }
  .result.success .title { color: #065f46; font-weight: 600; margin-bottom: 8px; font-size: 1.1rem; }
  .result.error .title { color: #991b1b; font-weight: 600; font-size: 1rem; }
  .result .row { display: flex; padding: 6px 0; font-size: 0.95rem; }
  .result .row .label { color: #6b7280; width: 110px; }
  .result .row .value { color: #1f2937; font-weight: 500; flex: 1; }
  .login-form { max-width: 380px; margin: 24px auto; text-align: center; }
  .login-form h2 { margin-bottom: 8px; }
  .login-form p { color: #6b7280; margin-bottom: 24px; font-size: 0.9rem; }
  .login-form input { width: 100%; padding: 14px; font-size: 1rem; border: 2px solid #e5e7eb; border-radius: 10px; outline: none; margin-bottom: 12px; }
  .login-form input:focus { border-color: #4f46e5; }
  .login-error { color: #dc2626; font-size: 0.85rem; margin-top: 8px; min-height: 18px; }
  .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; text-align: center; }
  .stat .num { font-size: 1.6rem; font-weight: 700; color: #4f46e5; }
  .stat .label { font-size: 0.8rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .search { flex: 1; min-width: 200px; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.95rem; outline: none; }
  .search:focus { border-color: #4f46e5; }
  .btn { padding: 10px 16px; border-radius: 8px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; font-size: 0.9rem; }
  .btn:hover { background: #f3f4f6; }
  .btn-primary { background: #4f46e5; color: #fff; border-color: #4f46e5; }
  .btn-primary:hover { background: #4338ca; }
  .btn-danger { background: #dc2626; color: #fff; border-color: #dc2626; }
  .btn-danger:hover { background: #b91c1c; }
  .table-wrap { overflow-x: auto; border: 1px solid #e5e7eb; border-radius: 10px; max-height: 500px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  thead { position: sticky; top: 0; background: #f9fafb; z-index: 1; }
  th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #e5e7eb; }
  th { font-weight: 600; color: #374151; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
  tbody tr:hover { background: #f9fafb; }
  td.pin { font-family: monospace; color: #4f46e5; font-weight: 600; }
  .empty { padding: 40px; text-align: center; color: #9ca3af; }
  .live-badge { display: inline-block; padding: 2px 8px; background: #10b981; color: #fff; border-radius: 12px; font-size: 0.7rem; margin-left: 6px; vertical-align: middle; }
  @media (max-width: 600px) { .header h1 { font-size: 1.15rem; } .role-grid { grid-template-columns: 1fr; } .body { padding: 24px 18px; } th, td { padding: 8px 10px; font-size: 0.82rem; } }
</style>

const configValid = !APPS_SCRIPT_URL.includes("PASTE_YOUR_URL");
if (configValid) { document.getElementById("connDot").className = "dot connected"; document.getElementById("connText").textContent = "Connected to cloud"; } else { document.getElementById("connDot").className = "dot error"; document.getElementById("connText").textContent = "Not configured"; }
async function apiPost(payload) { const res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) }); return await res.json(); }
async function apiGet() { const res = await fetch(APPS_SCRIPT_URL + "?t=" + Date.now()); return await res.json(); }
function showLanding() { document.getElementById("title").textContent = "Check-In System"; document.getElementById("subtitle").textContent = "Choose how you would like to continue"; document.getElementById("homeBtn").style.display = "none"; stopPolling(); let warning = ""; if (!configValid) { warning = '<div class="config-warn"><h3>&#9888;&#65039; Setup not complete</h3><p>Open this HTML file in a text editor and replace <code>PASTE_YOUR_URL_HERE</code> with your Google Apps Script URL.</p></div>'; } document.getElementById("content").innerHTML = warning + '<div class="landing"><h2>Welcome</h2><p>Please select your role to continue</p><div class="role-grid"><div class="role-card" onclick="showClient()"><div class="icon">&#128499;&#65039;</div><h3>Client Check-In</h3><p>Enter your PIN to register your attendance</p></div><div class="role-card" onclick="showAdminLogin()"><div class="icon">&#128274;</div><h3>Admin Dashboard</h3><p>View and manage all check-ins</p></div></div></div>'; }
function showClient() { document.getElementById("title").textContent = "Client Check-In"; document.getElementById("subtitle").textContent = "Enter your PIN below"; document.getElementById("homeBtn").style.display = "inline-block"; stopPolling(); document.getElementById("content").innerHTML = '<div class="client-form"><h2>Enter Your PIN</h2><p class="desc">Your check-in will be recorded once your PIN is verified.</p><input type="text" inputmode="numeric" class="pin-input" id="pinInput" placeholder="Enter PIN" maxlength="12" autocomplete="off"/><button class="submit-btn" id="submitBtn" onclick="submitPin()">Check In</button><div class="result" id="result"></div></div>'; const input = document.getElementById("pinInput"); input.focus(); input.addEventListener("keypress", e => { if (e.key === "Enter") submitPin(); }); input.addEventListener("input", e => { e.target.value = e.target.value.replace(/\D/g, ""); }); }
async function submitPin() { const input = document.getElementById("pinInput"); const btn = document.getElementById("submitBtn"); const result = document.getElementById("result"); const pin = input.value.trim(); result.className = "result"; result.innerHTML = ""; if (!pin) { result.className = "result error"; result.innerHTML = '<div class="title">Please enter your PIN</div>'; return; } const record = RECORDS[pin]; if (!record) { result.className = "result error"; result.innerHTML = '<div class="title">PIN not found. Please check and try again.</div>'; return; } if (!configValid) { result.className = "result error"; result.innerHTML = '<div class="title">System not connected. Please contact admin.</div>'; return; } btn.disabled = true; btn.textContent = "Checking in..."; try { const timestamp = Date.now(); const response = await apiPost({ action: "checkin", pin: pin, name: record.name, profession: record.profession, location: record.location, timestamp: timestamp }); if (response.error === "duplicate") { result.className = "result error"; result.innerHTML = '<div class="title">This PIN has already been checked in.</div><div class="row"><span class="label">Name:</span><span class="value">' + escapeHtml(record.name) + '</span></div>'; } else if (response.ok) { result.className = "result success"; result.innerHTML = '<div class="title">Check-in successful!</div><div class="row"><span class="label">Name:</span><span class="value">' + escapeHtml(record.name) + '</span></div><div class="row"><span class="label">Profession:</span><span class="value">' + escapeHtml(record.profession) + '</span></div><div class="row"><span class="label">Location:</span><span class="value">' + escapeHtml(record.location) + '</span></div><div class="row"><span class="label">Time:</span><span class="value">' + new Date(timestamp).toLocaleString() + '</span></div>'; input.value = ""; input.focus(); } else { result.className = "result error"; result.innerHTML = '<div class="title">Save failed: ' + escapeHtml(response.error || "unknown error") + '</div>'; } } catch (e) { result.className = "result error"; result.innerHTML = '<div class="title">Network error. Please check your internet and try again.</div>'; } btn.disabled = false; btn.textContent = "Check In"; }
function showAdminLogin() { document.getElementById("title").textContent = "Admin Login"; document.getElementById("subtitle").textContent = "Authorized personnel only"; document.getElementById("homeBtn").style.display = "inline-block"; stopPolling(); document.getElementById("content").innerHTML = '<div class="login-form"><h2>Admin Access</h2><p>Enter the admin password to continue</p><input type="password" id="adminPwd" placeholder="Password" autocomplete="off"/><button class="submit-btn" onclick="checkAdminLogin()">Sign In</button><div class="login-error" id="loginErr"></div></div>'; const pwd = document.getElementById("adminPwd"); pwd.focus(); pwd.addEventListener("keypress", e => { if (e.key === "Enter") checkAdminLogin(); }); }
function checkAdminLogin() { const pwd = document.getElementById("adminPwd").value; if (pwd === ADMIN_PASSWORD) showAdmin(); else document.getElementById("loginErr").textContent = "Incorrect password"; }
let allCheckIns = []; let pollTimer = null;
function stopPolling() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }
async function showAdmin() { document.getElementById("title").textContent = "Admin Dashboard"; document.getElementById("subtitle").textContent = "Auto-refreshes every " + (REFRESH_INTERVAL/1000) + " seconds"; document.getElementById("homeBtn").style.display = "inline-block"; document.getElementById("content").innerHTML = '<div class="stats-bar"><div class="stat"><div class="num" id="statTotal">0</div><div class="label">Total Check-ins <span class="live-badge">LIVE</span></div></div><div class="stat"><div class="num" id="statToday">0</div><div class="label">Today</div></div><div class="stat"><div class="num">' + Object.keys(RECORDS).length.toLocaleString() + '</div><div class="label">Registered PINs</div></div></div><div class="toolbar"><input class="search" id="searchBox" placeholder="Search by name, PIN, profession or location..."/><button class="btn btn-primary" onclick="loadCheckIns()">Refresh now</button><button class="btn" onclick="exportCsv()">Export CSV</button><button class="btn btn-danger" onclick="clearAll()">Clear All</button></div><div class="table-wrap"><table><thead><tr><th>#</th><th>Time</th><th>Name</th><th>PIN</th><th>Profession</th><th>Location</th></tr></thead><tbody id="tbody"><tr><td colspan="6" class="empty">Loading...</td></tr></tbody></table></div>'; document.getElementById("searchBox").addEventListener("input", renderTable); if (!configValid) { document.getElementById("tbody").innerHTML = '<tr><td colspan="6" class="empty">Not configured.</td></tr>'; return; } await loadCheckIns(); stopPolling(); pollTimer = setInterval(loadCheckIns, REFRESH_INTERVAL); }
async function loadCheckIns() { try { const response = await apiGet(); if (response.ok) { allCheckIns = (response.checkins || []).sort((a, b) => b.timestamp - a.timestamp); renderTable(); } } catch (e) { if (allCheckIns.length === 0) { const tbody = document.getElementById("tbody"); if (tbody) tbody.innerHTML = '<tr><td colspan="6" class="empty">Connection error. Will retry...</td></tr>'; } } }
function renderTable() { const search = (document.getElementById("searchBox")?.value || "").toLowerCase().trim(); const tbody = document.getElementById("tbody"); if (!tbody) return; document.getElementById("statTotal").textContent = allCheckIns.length; const today = new Date(); today.setHours(0,0,0,0); document.getElementById("statToday").textContent = allCheckIns.filter(e => e.timestamp >= today.getTime()).length; const filtered = search ? allCheckIns.filter(e => String(e.name).toLowerCase().includes(search) || String(e.pin).includes(search) || String(e.profession).toLowerCase().includes(search) || String(e.location).toLowerCase().includes(search)) : allCheckIns; if (filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="empty">' + (allCheckIns.length === 0 ? "No check-ins yet." : "No matches.") + '</td></tr>'; return; } tbody.innerHTML = filtered.map((e, i) => '<tr><td>' + (i+1) + '</td><td>' + new Date(e.timestamp).toLocaleString() + '</td><td>' + escapeHtml(e.name) + '</td><td class="pin">' + escapeHtml(e.pin) + '</td><td>' + escapeHtml(e.profession) + '</td><td>' + escapeHtml(e.location) + '</td></tr>').join(""); }
function exportCsv() { if (allCheckIns.length === 0) { alert("No data to export."); return; } const rows = [["#", "Timestamp", "Name", "PIN", "Profession", "Location"]]; allCheckIns.forEach((e, i) => { rows.push([i+1, new Date(e.timestamp).toLocaleString(), e.name, e.pin, e.profession, e.location]); }); const csv = rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(",")).join("\n"); const blob = new Blob([csv], { type: "text/csv" }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = "check-ins-" + new Date().toISOString().slice(0,10) + ".csv"; a.click(); URL.revokeObjectURL(url); }
async function clearAll() { if (!confirm("This will permanently delete ALL check-in records. Continue?")) return; if (!confirm("Are you absolutely sure?")) return; try { const response = await apiPost({ action: "clear" }); if (response.ok) { await loadCheckIns(); alert("All records cleared."); } else { alert("Error: " + (response.error || "unknown")); } } catch (e) { alert("Network error: " + e.message); } }
function escapeHtml(str) { return String(str).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
